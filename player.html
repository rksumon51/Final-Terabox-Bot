<!DOCTYPE html>
<html>
<head>

<title>Video Player</title>

<style>

body{
background:black;
margin:0;
}

video{
width:100%;
height:100vh;
}

</style>

</head>

<body>

<video id="player" controls autoplay></video>

<script>

const params = new URLSearchParams(window.location.search);
const url = params.get("url");

document.getElementById("player").src = url;

</script>

</body>
</html>
